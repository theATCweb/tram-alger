name: tram_alger
description: Algiers Tramway real-time ETA
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  dio: ^5.4.3
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_hive_store: ^3.2.1
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  geolocator: ^11.0.0
  flutter_local_notifications: ^17.1.2
  connectivity_plus: ^6.0.3
  uuid: ^4.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/stations_fallback.json
